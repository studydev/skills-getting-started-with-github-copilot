name: Step 2
on:
  push:
    branches:
      - "accelerate-with-copilot"
    paths:
      - "src/app.py"

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v5
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: 실습 확인

      - name: 추가 학생 활동 확인
        id: check-additional-activities
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: src/app.py
          keyphrase: '"description"'
          minimum-occurrences: 4
          case-sensitive: false

      - name: 댓글 업데이트 - 단계 결과
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "src/app.py에 새 활동 추가됨. ${{ steps.check-additional-activities.outputs.occurrences }}개 활동 발견 (최소 4개 필요)"
                passed: ${{ steps.check-additional-activities.outcome == 'success' }}

      - name: 확인 실패 시 작업 실패 처리
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v5
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 생성 - 단계 완료
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: 댓글 생성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}

      - name: 댓글 생성 - 진행 상황 감시
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 현재 워크플로우 비활성화 및 다음 활성화
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 2,
              "description": "Copilot 작업",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            ' || true
